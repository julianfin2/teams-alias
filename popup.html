<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f9fafb;
            margin: 0;
            padding: 12px;
            width: 160px;
            color: #111827;
        }

        h3 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #1f2937;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 6px 8px;
            margin-top: 8px;
            background-color: #2563eb;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        i {
            font-size: 14px;
        }

        #fileInput {
            display: none;
        }

        #status {
            margin-top: 8px;
            min-height: 15px;
            font-size: 11px;
            line-height: 1.35;
            color: #4b5563;
            text-align: center;
            word-break: break-word;
        }
    </style>
    <title>Teams 别名管理</title>
</head>
<body>
<h3>Teams 别名管理</h3>
<input id="fileInput" type="file" accept=".csv,text/csv">
<button id="import">导入 CSV</button>
<button id="export">导出</button>
<div id="status"></div>
<script src="popup.js"></script>
</body>
</html>
