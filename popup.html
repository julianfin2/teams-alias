<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f9fafb;
            margin: 0;
            padding: 12px;
            width: 220px;
            color: #111827;
        }

        h3 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #1f2937;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 6px 8px;
            margin-top: 8px;
            background-color: #2563eb;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        button.secondary {
            background-color: #4b5563;
        }

        button.secondary:hover {
            background-color: #374151;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            box-sizing: border-box;
            padding: 6px 8px;
            margin-top: 8px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 12px;
            color: #111827;
            background: white;
        }

        i {
            font-size: 14px;
        }

        #fileInput {
            display: none;
        }

        #status {
            margin-top: 8px;
            min-height: 15px;
            font-size: 11px;
            line-height: 1.35;
            color: #4b5563;
            text-align: center;
            word-break: break-word;
        }
    </style>
    <title>Teams 别名管理</title>
</head>
<body>
<h3>Teams 别名管理</h3>
<input id="syncUrl" type="text" placeholder="Apps Script URL">
<input id="syncToken" type="password" placeholder="Token">
<button id="saveSync">保存同步设置</button>
<button id="syncNow" class="secondary">立即同步</button>
<div id="status"></div>
<script src="popup.js"></script>
</body>
</html>
