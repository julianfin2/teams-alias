name: Release Browser Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate manifest version
        run: |
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('manifest.json', encoding='utf-8'))['version'])")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "manifest.json version $MANIFEST_VERSION does not match tag $GITHUB_REF_NAME"
            exit 1
          fi

      - name: Package Extension
        run: |
          mkdir -p dist
          cp manifest.json background.js content.js popup.html popup.js dist/
          cp -R icons dist/icons
          cd dist
          zip -r "../teams-alias-${GITHUB_REF_NAME}.zip" .

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: '*.zip'

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: '*.zip'
          generate_release_notes: true
